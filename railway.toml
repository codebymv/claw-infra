# Railway deployment configuration for ZeroClaw Dashboard
# Deploy each service (backend, frontend) separately in Railway
# and configure env vars via Railway's dashboard or CLI.
#
# Recommended Railway setup:
#   Project: claw-infra
#   ├── Service: backend     (build from ./backend, Root Dir: /backend)
#   ├── Service: frontend    (build from ./frontend, Root Dir: /frontend)
#   ├── Database: PostgreSQL (Railway managed)
#   └── Database: Redis      (Railway managed)
#
# Service-specific railway.toml files live in each service directory.
# Do NOT add [build] or [deploy] sections here — they conflict with
# per-service Root Directory settings configured in Railway's dashboard.
